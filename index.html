<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>密码强度评估</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="container">
      <!-- 左侧面板 -->
      <div class="left-panel">
        <h1>密码强度评估</h1>

        <div class="password-container">
          <div class="password-wrapper">
            <input
              id="password"
              type="password"
              autocomplete="new-password"
              placeholder="放心，所有计算均处于本地"
            />
            <span id="customCaret" class="custom-caret" aria-hidden="true">_</span>
            <button class="eye-button" id="eyeButton" aria-label="显示密码">
              <img src="./svg/visible.svg" alt="" class="eye-icon eye-open" />
              <img src="./svg/invisible.svg" alt="" class="eye-icon eye-closed" />
            </button>
          </div>
        </div>

        <p class="suggestion" id="suggestion"></p>
      </div>

      <!-- 右侧面板 -->
      <div class="right-panel">
        <!-- 切换按钮 -->
        <div class="mode-toggle">
          <button class="mode-button active" data-mode="default">默认</button>
          <button class="mode-button" data-mode="advanced">高级</button>
        </div>

        <!-- 进度环 -->
        <div class="entropy-ring-container">
          <div class="entropy-ring">
            <svg viewBox="0 0 260 260">
              <circle class="entropy-ring-background" cx="130" cy="130" r="92" />
              <circle
                class="entropy-ring-progress"
                id="entropyProgress"
                cx="130"
                cy="130"
                r="92"
                stroke="#ff3b30"
              />
            </svg>
            <div class="entropy-ring-label">
              <div class="entropy-value" id="entropyValue">0</div>
              <div class="entropy-unit">bits</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
