<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>密码强度评估</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="container">
      <!-- 左侧面板 -->
      <div class="left-panel">
        <h1>密码强度评估</h1>

        <div class="password-container">
          <div class="password-wrapper">
            <input
              id="password"
              type="password"
              autocomplete="new-password"
              placeholder="放心，所有计算均处于本地"
            />
            <span id="customCaret" class="custom-caret" aria-hidden="true"></span>
            <button class="eye-button" id="eyeButton" aria-label="显示密码">
              <img src="./svg/visible.svg" alt="" class="eye-icon eye-open" />
              <img src="./svg/invisible.svg" alt="" class="eye-icon eye-closed" />
            </button>
          </div>
        </div>

        <p class="suggestion" id="suggestion"></p>
      </div>

      <!-- 右侧面板 -->
      <div class="right-panel">
        <!-- 切换按钮 -->
        <div class="mode-toggle">
          <button class="mode-button active" data-mode="normal">普通</button>
          <button class="mode-button" data-mode="advanced">高级</button>
        </div>

        <!-- 进度环 -->
        <div class="entropy-ring-container">
          <div class="entropy-ring">
            <svg viewBox="0 0 260 260">
              <circle class="entropy-ring-background" cx="130" cy="130" r="92" />
              <circle
                class="entropy-ring-progress"
                id="entropyProgress"
                cx="130"
                cy="130"
                r="92"
              />
            </svg>
            <div class="entropy-ring-label" id="entropyRingLabel">
              <div class="entropy-value" id="entropyValue">0</div>
              <div class="entropy-unit" id="entropyUnit">bits</div>
            </div>
          </div>
        </div>

        <!-- 高级模式检测列表 -->
        <div class="check-list" id="checkList">
          <div class="check-item">
            <span class="check-desc">包含大写字母</span>
            <span class="check-icon" id="checkUpper">✗</span>
          </div>
          <div class="check-item">
            <span class="check-desc">包含小写字母</span>
            <span class="check-icon" id="checkLower">✗</span>
          </div>
          <div class="check-item">
            <span class="check-desc">包含数字</span>
            <span class="check-icon" id="checkDigit">✗</span>
          </div>
          <div class="check-item">
            <span class="check-desc">包含特殊字符</span>
            <span class="check-icon" id="checkSpecial">✗</span>
          </div>
          <div class="check-item">
            <span class="check-desc">不含词典关键字</span>
            <span class="check-icon" id="checkNoKeyword">✗</span>
          </div>
          <div class="check-item">
            <span class="check-desc">非常见弱密码</span>
            <span class="check-icon" id="checkNotWeak">✗</span>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <a href="https://github.com/knight-de-ficus/PaQe" target="_blank" rel="noopener">

    <script type="module" src="./app.js"></script>
  </body>
</html>
