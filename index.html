<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>密码强度评估</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "PingFang SC", "Microsoft YaHei", sans-serif; margin: 24px; }
      .row { display: flex; flex-direction: column; gap: 8px; max-width: 520px; }
      label { font-weight: 600; }
      input { font-size: 16px; padding: 10px 12px; }
      .meta { color: #555; font-size: 14px; }
      .out { margin-top: 12px; padding: 12px; border: 1px solid #ddd; }
      .out strong { font-size: 18px; }
    </style>
  </head>
  <body>
    <h1>密码强度评估</h1>

    <div class="row">
      <label for="password">密码</label>
      <input id="password" type="password" autocomplete="new-password" placeholder="请输入密码" />
      <div class="meta" id="dictStatus">常见密码词典：加载中…</div>

      <div class="out">
        <div>强度（熵，bits）：<strong id="entropyBits">0</strong></div>
        <div class="meta">说明：数值越大，通常意味着越难被猜测/穷举。</div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
